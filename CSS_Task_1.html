<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task One - CSS</title>
</head>
<body>
    <div class="table__container">
        <h3>Ninja Details</h3>
    <hr>
    <table align="center" width="320" border="1">
        <thead>
            <tr>
                <th>Name</th>
                <th>Age</th>
                <th>Grade</th>
            </tr>
        </thead>

        <tbody>
            <tr><td style="background-color: rgba(255, 0, 0, 0.256); text-align: center;">Ninja A</td> <td>18</td> <td>B</td></tr>
            <tr><td>Ninja B</td> <td>23</td> <td>C</td></tr>
            <tr><td>Ninja C</td> <td>22</td> <td>A</td></tr>
            <tr><th colspan="3">Ninja C - the best learner!</th></tr>
        </tbody>
    </table>
    </div>
</body>

<style>
    .table__container {
        max-width: 320px;
        margin-inline: auto;
    }

    h3 {
        text-align: center;
    }

    thead tr {
        background-color: yellow;
        text-align: right;
    }

    tbody td {
        text-align: left;
    }
</style>
</html>
