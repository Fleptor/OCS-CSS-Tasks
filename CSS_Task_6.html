<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Six - CSS</title>
    <style>
        body {
            margin: 0;
            padding: 0;
        }
        .section_one {
            display: flex;
            color: white;
        }

        .first_part {
            display: grid;
            text-align: center;
            place-items: center;
            min-height: 100vh;
            width: 50vw;
            background-color: orange;
        }

        .second_part {
            display: grid;
            place-items: center;
            text-align: center;
            min_height: 100vh; 
            width: 50vw;
            background-color: blue;
        }

        h1 {
            margin: auto;
        }

        .section_two {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
        }

        .section_two img {
            height: 100%;
            width: 100%;
        }

        .section_three {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(3, 1fr);
            border: 10px orange solid;
        }

        .section_three .numbered_box {
            display: grid;
            place-items: center;
            color: white;
            text-shadow: 4px 2px 2.5px rgba(0, 0, 0, 0.24);
            width: 100%;
            min-height: 180px;
            font-size: 62px;
        }

        .section_four {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            min-height: 100vh;
            color: white;
            font-size: 30px;
        }

        .row-1 {
            grid-column: 1 / -1;
            min-height: 10vh;
            background-color: black;
        }

        .col-1 {
            min-width: 55vw;
            min-height: 60vh;
            background-color: orange;
        }

        .col-2 {
            min-width: 40vw;
            min-height: 60vh;
            background-color: green;
        }

        .row-3 {
            grid-column: 1 / -1;
            min-height: 30vh;
            background-color: blue;           
        }

        .section_five {
            min-height: 100vh;
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            border: 10px orange solid;

        }

        .section_five .numbered_box {
            text-align: center;
            font-size: 24px;
            padding-top: 50px;
            color: white;
        }
    </style>
</head>
<body>
    <section class="section_one">
        <div class="first_part"><h1>FIRST PART</h1></div>
        <div class="second_part"><h1>SECOND PART</h1></div>
    </section>
    <section class="section_two">
        <img src="https://sb.ecobnb.net/app/uploads/sites/3/2022/04/copertina-1.jpg" alt="Lush green valley with a picturesque mountain backdrop">

        <img src="https://i.natgeofe.com/n/cfa19a0d-eff0-4628-8fdd-2ad8d66845dd/mountain-range-appenzell-switzerland.jpg" alt="Majestic mountain peaks in Appenzell, Switzerland">

        <img src="https://images.photowall.com/products/50288/serene-waterfall.jpg?h=699&q=85" alt="Serene waterfall cascading over rocks in a dense forest">

        <img src="https://images.photowall.com/products/50288/serene-waterfall.jpg?h=699&q=85" alt="Sunlit alpine meadow overlooking a valley">

        <img src="https://i.natgeofe.com/n/cfa19a0d-eff0-4628-8fdd-2ad8d66845dd/mountain-range-appenzell-switzerland.jpg" alt="Autumn woods with vibrant orange and yellow leaves near a stone bridge">

        <img src="https://sb.ecobnb.net/app/uploads/sites/3/2022/04/copertina-1.jpg" alt="Lush green valley with a picturesque mountain backdrop" alt="Sweeping desert sand dunes with intricate wind patterns">

        <img src="https://static.vecteezy.com/system/resources/previews/006/240/319/large_2x/tropical-beach-paradise-as-summer-landscape-with-beach-swing-or-hammock-and-white-sand-calm-sea-serene-beach-luxury-beach-vacation-summer-holiday-tranquil-romantic-island-nature-travel-destination-photo.jpg" alt="Tropical white sand beach with a hanging wicker swing by turquoise water">

        <img src="https://images.stockcake.com/public/b/e/0/be09042a-ef17-4225-ae20-8e411773c5fa_large/mountain-lake-reflection-stockcake.jpg" alt="Crystal clear alpine lake perfectly reflecting the surrounding mountain range">
    </section>

    <section class="section_three">
        <div style="background-color:rebeccapurple" class="numbered_box">1</div>
        <div style="background-color: teal;" class="numbered_box">2</div>
        <div style="background-color: orangered;" class="numbered_box">3</div>
        <div style="background-color: crimson;" class="numbered_box">4</div>
        <div style="background-color: silver" class="numbered_box">5</div>
        <div style="background-color: saddlebrown" class="numbered_box">6</div>
        <div style="background-color: dodgerblue" class="numbered_box">7</div>
        <div style="background-color: forestgreen" class="numbered_box">8</div>
        <div style="background-color: plum" class="numbered_box">9</div>
        <div style="background-color: yellow" class="numbered_box">10</div>
    </section>

    <section class="section_four">
        <div class="row-1">Row 1</div>
        <div class="col-1">Row 2: Col 1</div>
        <div class="col-2">Row 2: Col 2</div>
        <div class="row-3">Row 3</div>
    </section>

    <section class="section_five">
        <div style="background-color:rebeccapurple" class="numbered_box">1</div>
        <div style="background-color: teal;" class="numbered_box">2</div>
        <div style="background-color: orangered;" class="numbered_box">3</div>
        <div style="background-color: crimson;" class="numbered_box">4</div>
        <div style="background: linear-gradient(silver, yellow)" class="numbered_box">5</div>
        <div style="background-color: saddlebrown" class="numbered_box">6</div>
        <div style="background-color: dodgerblue" class="numbered_box">7</div>
        <div style="background-color: forestgreen" class="numbered_box">8</div>
        <div style="background-color: plum" class="numbered_box">9</div>
    </section>
</body>
</html>
