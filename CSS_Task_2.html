<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Two - CSS</title>
    <script src="https://kit.fontawesome.com/d1fd6c7b6f.js" crossorigin="anonymous"></script>
    <style>
    :root {
        --linkedin-blue: #0072b1;
    }
    
     * {
        box-sizing: border-box;
     }

     body {
        margin: 0;
        padding: 0;
        background-color: #aaa;
        font-family: Arial, Helvetica, sans-serif;

     }

    section {
            min-height: 100vh;
            display: grid;
            place-items: center;
    }

    .linkedin_card {
            background-color: white;
            width: 100%;
            max-width: 360px;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            color: black;
            text-align: left;
    }

    .linkedin_card h2 {
        font-size: 1.8rem;
        margin-top: 0;
        margin-bottom: 4px;
    }

    .linkedin_card .heading_wrapper {
        margin-bottom: 25px;
    }

    .linkedin {
        display: flex;
        flex-direction: column;
        gap: 32px;
    }


    .linkedin input {
        width: 100%;
        padding: 10px;
        font-size: 18px;
    }

    .password_wrapper {
        display: flex;
        border: 1px solid black;
    }

    .password_wrapper > * {
        border: none;
        background-color: white;
    }

    .password_wrapper button {
        color: var(--linkedin-blue);
        font-weight: normal;
        padding-inline: 10px;
        cursor: pointer;
        font-weight: bold;
    }

    .password_wrapper button:hover {
        text-decoration: underline;
    }

    .linkedin_forgot_password {
        margin-top: -20px;
        color: var(--linkedin-blue);
        font-weight: bold;
        cursor: pointer;
    }

    .linkedin_forgot_password:hover {
        text-decoration: underline;
    }

    .button_wrapper {
        display: flex;
        flex-direction: column;
        text-align: center;
        color: gray;
    }

    .button_wrapper:focus { border: 5px solid var(--linkedin-blue);}

    .button_wrapper button {
        width: 100%;
        padding: 15px;
        border-radius: 50px;
        font-size: 16px;
        cursor: pointer;    
    }

    .button_wrapper button:hover {
        color:
    }

    .linkedin_button {
        background-color: var(--linkedin-blue);
        color: white;
        border: none;
        margin-bottom: 5px;
    }

    .linkedin_button:hover { background-color: #024a70;}

    .linkedin_button_secondary {
        background-color: white;
        color: black;
        border: 2px solid black;
        margin-top: 5px;

    }

    .linkedin_button_secondary:hover { background-color: #ded6d6;}

    .scratch_header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 80%;
        padding: 20px;
        margin-top: 20px;
        background-color: rgb(221, 240, 240);
        place-content: top;
    }
    
    .scratch_header h2 {
        color: #666666;
    }

    .sign_menu_wrapper a {
        color: black;
        text-decoration: none;
        margin-inline: 5px;
        font-size: 20px;
    }

    .sign_menu_wrapper a:hover { text-decoration: underline; }

    .sign_menu_wrapper .selected {
        color: #666666;
    }

    .sign_menu_wrapper .selected:hover {
        text-decoration: none;
    }

    .scratch_card {
        width: 100%;
        max-width: 420px;
        padding: 40px 30px;
        border-radius: 12px;
        color: black;
        text-align: left;
    }

    .login {
        display: flex;
        flex-direction: column;
        gap: 1rem;
    }

    .login input {
        padding: 15px;
        border-radius: 8px;
        border: 1px solid gray;
    }

    .login button {
        padding: 15px;
        background-color: dodgerblue;
        border-radius: 8px;
        color: white;
        font-size: 18px;
    }

    .gradient_card {
        width: 100%;
        max-width: 450px;
        background-color: white;
        padding: 60px 30px;
        border-radius: 12px;
        color: black;
        text-align: left;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
    }

    .gradient_card input {
        width: 80%;
        margin-top: 20px;
        border-radius: 4px;
        align-self: center;
    }

    .gradient_card button {
        border: none;
        width: fit-content;
        padding: 15px 25px;
        background-color: #0B847A;
        border-radius: 8px;
        color: white;
        font-size: 14px;
        align-self: center;
    }

     .gradient_card .login {
        display: flex;

    } 

    .gradient_card h2 {
        font-weight: normal;
        text-align: center;
        color: #0B847A;
    }

    .gradient_card .password_show_wrapper {
        width: 80%;
        align-self: center;
    }

    .gradient_card .options_wrapper {
        align-self: center;
        font-size: 14px;
    }

    .gradient_card .options_wrapper a {
        text-decoration: none;
        color: #0B847A;
        margin: 0;
    }

    .gradient_card .options_wrapper span {
        display: inline-block;
        margin-top: 8px;
    }
    
    .teal_card {
        width: 100%;
        max-width: 550px;
        background-color: white;
        padding: 20px 20px;
        color: black;
        text-align: left;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
    }

    .teal_card .login {
        align-items: center;
    }   

    .teal_card h2 {
        font-weight: bold;
        font-size: 32px;
        text-align: center;
        letter-spacing: 0.25rem;
    }

    .teal_card input {
        width: 80%;
        border: none;
        border-bottom: 1px solid gray;

    }

    .teal_card button {
        width: 80%;
        background-color: #1ABC9C;
        font-weight: bold;
        font-size: 24px;
    }

    .teal_card .options_wrapper a {
        color: black;
        text-decoration: none;
    }

    .teal_card .options_wrapper a:hover {
        text-decoration: underline;
    }

    .teal_card label {
        color: #1ABC9C;
        width: 80%;
    }
    </style>
</head>
<body>
   <section>
       <div class="linkedin_card">
            <div class="heading_wrapper">
            <h2>Sign in</h2>
            <span>Stay updated on your professional world</span>
            </div>
            <form class="linkedin" action="">
                
                <input type="email" placeholder="Email or Phone" required>
                <div class="password_wrapper">
                <input type="password" placeholder="Password" required>
                <button type="button" class="password_show">Show</button>
                </div>
                <span class="linkedin_forgot_password">Forgot Password?</span>
                <div class="button_wrapper">
                <button type="button" class="linkedin_button">Sign in</button>
                <span>⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯ or ⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯<span><br>
                <button type="button" class="linkedin_button_secondary"><i style="font-size: 22px;" class="fa-brands fa-apple"></i>  Sign in with Apple</button>
                </div>
            </form>
        </div>
   </section>

   <section style="background-color: #fefffc;">
    <header class="scratch_header">
        <div><h2>Scratch</h2></div>
        <div class="sign_menu_wrapper">
            <a href="#" class="selected">Signup</a>
            <a href="#">Login</a>
        </div>
    </header>
        <div class="scratch_card">
            <form class="login" action="">
                <label for="scratch_email">Email</label>
                <input type="text" id="scratch_email" required>

                <label for="scratch_password">Password</label>
                <input type="password" id="scratch_password" required>

                <button type="button">Login</button>
            </form>
        </div>
   </section>

   <section style="background: linear-gradient(teal, yellowgreen);">
          <div class="gradient_card">
            <h2>Login</h2>
            <form class="login" action="">
                <input type="text" placeholder="Email" id="scratch_email" required>

                <input type="password" placeholder="Password" id="scratch_password" required>
                <div class="password_show_wrapper">
                    <input style="width: 5%; margin: 0;" type="checkbox">
                    <span>Show Password</span>
                </div>
                <button type="button">SIGN IN</button>

                <div class="options_wrapper">
                    <a href="#">Forgot Username / Password?</a><br>
                    <Span>Don't have an account? <a href="#">Sign up</a></Span> 
                </div>
            </form>
        </div>
   </section>

      <section style="background-color: #1ABC9C;">
          <div class="teal_card">
            <h2>USER LOGIN</h2>
            <form class="login" action="">
                <label for="scratch_email">Username</label>
                <input type="text" id="scratch_email" required>

                <label for="scratch_email">Password</label>
                <input type="password" id="scratch_password" required>
                <button type="button">LOGIN</button>

                <div class="options_wrapper">
                    <a href="#">Forgot Password?</a><br>
                </div>
            </form>
        </div>
   </section>
</body>
</html>
